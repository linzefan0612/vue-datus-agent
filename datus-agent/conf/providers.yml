# LLM Provider catalog for interactive init (`datus-cli init`)
# Add new providers/models here without changing Python code.

providers:
  openai:
    type: openai
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    default_model: gpt-5.5
    models:
      - gpt-5.5
      - gpt-5.4
      - gpt-5.4-mini
      - gpt-5.4-nano
      - o3
      - o3-pro
      - o4-mini

  deepseek:
    type: deepseek
    base_url: https://api.deepseek.com
    api_key_env: DEEPSEEK_API_KEY
    default_model: deepseek-v4-pro
    models:
      - deepseek-v4-pro
      - deepseek-v4-flash

  claude:
    type: claude
    base_url: https://api.anthropic.com
    api_key_env: ANTHROPIC_API_KEY
    default_model: claude-sonnet-4-6
    models:
      - claude-haiku-4-5
      - claude-sonnet-4-6
      - claude-opus-4-6
      - claude-opus-4-7

  kimi:
    type: kimi
    base_url: https://api.moonshot.cn/v1
    api_key_env: KIMI_API_KEY
    default_model: kimi-k2.6
    models:
      - kimi-k2.6
      - kimi-k2.5
      - kimi-k2-thinking

  qwen:
    type: openai
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api_key_env: DASHSCOPE_API_KEY
    default_model: qwen3.6-plus
    models:
      - qwen3.6-plus
      - qwen3.6-flash
      - qwen3.5-plus
      - qwen3-coder-next
      - qwen3-coder-plus

  gemini:
    type: gemini
    base_url: https://generativelanguage.googleapis.com/v1beta
    api_key_env: GEMINI_API_KEY
    default_model: gemini-3.1-pro-preview
    models:
      - gemini-3.1-pro-preview
      - gemini-3.1-flash-lite-preview
      - gemini-2.5-pro
      - gemini-2.5-flash

  minimax:
    type: minimax
    base_url: https://api.minimaxi.com/v1
    api_key_env: MINIMAX_API_KEY
    default_model: MiniMax-M2.7
    models:
      - MiniMax-M2.7
      - MiniMax-M2.5

  glm:
    type: glm
    base_url: https://open.bigmodel.cn/api/paas/v4
    api_key_env: GLM_API_KEY
    default_model: glm-5.1
    models:
      - glm-5.1
      - glm-5-turbo
      - glm-5
      - glm-4.7
      - glm-4.5-air
      - glm-4.5-flash

  # OpenRouter unified gateway — one API key, 300+ models routed by vendor/slug.
  # The `models` list below is an offline fallback; when online,
  # provider_model_catalog overlays the full live catalog (cached locally).
  openrouter:
    type: openrouter
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    default_model: anthropic/claude-sonnet-4
    models:
      - anthropic/claude-sonnet-4
      - openai/gpt-4o
      - google/gemini-2.5-pro
      - deepseek/deepseek-chat

  # Coding Plan providers (vendor Anthropic-compatible endpoints)
  alibaba_coding:
    type: claude
    base_url: https://coding-intl.dashscope.aliyuncs.com/apps/anthropic
    default_model: qwen3-coder-plus
    models_from: qwen
    models:
      - qwen3-coder-plus
      - qwen3.5-plus
      - glm-5
      - kimi-k2.5
      - MiniMax-M2.5

  bigmodel_coding:
    type: claude
    base_url: https://open.bigmodel.cn/api/anthropic
    default_model: glm-5.1
    models_from: glm
    models:
      - glm-5.1
      - glm-5

  zai_coding:
    type: claude
    base_url: https://api.z.ai/api/anthropic
    default_model: glm-5.1
    models_from: glm
    models:
      - glm-5.1
      - glm-5

  minimax_coding:
    type: claude
    base_url: https://api.minimaxi.com/anthropic
    default_model: MiniMax-M2.7
    models_from: minimax
    models:
      - MiniMax-M2.7

  kimi_coding:
    type: claude
    base_url: https://api.kimi.com/coding/
    default_model: kimi-for-coding
    models_from: kimi
    models:
      - kimi-for-coding

  # Claude subscription (Pro/Max plan via setup-token)
  claude_subscription:
    type: claude
    auth_type: subscription
    base_url: https://api.anthropic.com
    default_model: claude-sonnet-4-6
    models_from: claude
    models:
      - claude-opus-4-7
      - claude-opus-4-6
      - claude-sonnet-4-6
      - claude-haiku-4-5

  # Codex (ChatGPT Plus/Pro subscription via OAuth)
  codex:
    type: codex
    auth_type: oauth
    base_url: https://chatgpt.com/backend-api/codex
    default_model: codex-mini-latest
    models_from: openai
    models:
      - codex-mini-latest

# Model-specific parameter overrides
# Some models enforce fixed values; these are auto-applied during init.
model_overrides:
  kimi-k2.5:
    temperature: 1.0
    top_p: 0.95
  kimi-k2.6:
    temperature: 1.0
    top_p: 0.95
  qwen3-coder-plus:
    temperature: 1.0
    top_p: 0.95
  qwen3-coder-next:
    temperature: 1.0
    top_p: 0.95

# Model specifications: context_length and max_tokens for each model.
# Used for token budget management. Prefix matching is applied at runtime
# (e.g. "gpt-4o-mini" matches "gpt-4o", "kimi-k2-0711-preview" matches "kimi-k2").
