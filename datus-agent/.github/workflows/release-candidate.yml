name: "Release Candidate Validation"

on:
  workflow_dispatch:
    inputs:
      expected_version:
        description: "Expected datus-agent version on this branch, for example 0.3.1 or 0.3.1rc1"
        required: false
        default: ""
        type: string
      ref:
        description: "Release branch, tag, or SHA to validate. Defaults to the selected workflow ref."
        required: false
        default: ""
        type: string
  workflow_call:
    inputs:
      expected_version:
        required: false
        default: ""
        type: string
      ref:
        required: false
        default: ""
        type: string
  pull_request:
    branches:
      - "release/**"
  push:
    branches:
      - "release/**"

permissions:
  contents: read

concurrency:
  group: release-candidate-${{ inputs.ref || github.ref }}-${{ inputs.expected_version || github.sha }}
  cancel-in-progress: false

env:
  RELEASE_CANDIDATE_DIST_ARTIFACT: datus-agent-release-candidate-dist-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  package-smoke:
    name: Package and docs smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build packaging twine

      - name: Resolve expected version
        id: release
        shell: bash
        env:
          EXPECTED_VERSION_INPUT: ${{ inputs.expected_version || '' }}
        run: |
          set -euo pipefail
          if [[ -n "${EXPECTED_VERSION_INPUT}" ]]; then
            version="${EXPECTED_VERSION_INPUT}"
          else
            version="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(pyproject["project"]["version"])
          PY
          )"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Resolved release candidate version: ${version}"

      - name: Check release version and dependency metadata
        env:
          EXPECTED_VERSION: ${{ steps.release.outputs.version }}
        run: |
          python ci/check_release_readiness.py \
            --expected-version "$EXPECTED_VERSION" \
            --check-tag-available \
            --check-adapter-latest

      - name: Build release candidate distributions
        run: python -m build --outdir dist-release-candidate

      - name: Validate release candidate distributions
        run: python -m twine check dist-release-candidate/*

      - name: Install wheel in a clean environment
        shell: bash
        env:
          EXPECTED_VERSION: ${{ steps.release.outputs.version }}
        run: |
          python -m venv .release-smoke-venv
          source .release-smoke-venv/bin/activate
          python -m pip install --upgrade pip packaging
          python -m pip install dist-release-candidate/*.whl

          python ci/check_release_readiness.py \
            --expected-version "$EXPECTED_VERSION" \
            --check-installed-metadata \
            --check-console-versions

          smoke_dir="$(mktemp -d)"
          cd "$smoke_dir"
          python - <<'PY'
          import datus
          from datus.cli.main import ArgumentParser

          print(f"datus import smoke passed: {datus.__version__}")
          ArgumentParser()
          PY

      - name: Build docs strictly
        run: |
          python -m pip install -r requirements-docs.txt
          mkdocs build --strict

      - name: Upload release candidate distributions
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_CANDIDATE_DIST_ARTIFACT }}
          path: dist-release-candidate/*
          retention-days: 7
