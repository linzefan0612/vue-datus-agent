[pytest]
# Show verbose output
addopts = -s -vv --tb=short --showlocals --ignore=tests/test_full_gen_sql.py

# Configure test discovery
testpaths = tests
python_files = test_*.py

# Add project root to Python path
pythonpath = .

# Configure logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# disable deprecation warnings and pytest return warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestReturnNotNoneWarning
    ignore::pytest.PytestUnraisableExceptionWarning

markers =
    acceptance: PR acceptance tests (fast, deterministic, no external services)
    component: deterministic multi-component tests that use local fixtures and mocked LLMs
    llm_harness: deterministic mocked/fake-LLM harness correctness tests suitable for merge queue
    contract: adapter/core contract tests that enforce package behavior across implementations
    ci: deprecated compatibility marker; migrate callers to acceptance
    nightly: Nightly integration tests that require real LLM/external services
    provider_health: real provider smoke tests; failures primarily indicate external/provider risk
    product_e2e: real LLM product workflows with traces/rerun/failure classification
    known_flaky: flaky tests tracked by ci/flaky-registry.yml with owner and expiration
    quarantine: known-bad tests excluded from routine CI/nightly until the tracked owner fixes or expires them
    benchmark: benchmark harness and evaluator tests
    regression: mark tests as "regression_test"
    integration: mark tests as integration tests (multi-component, slower)
